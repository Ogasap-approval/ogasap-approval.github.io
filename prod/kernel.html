<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; connect-src 'self' https:; worker-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Approval Kernel</title>
    <link rel="stylesheet" href="./src/styles.css" integrity="sha256-wL5c+SeQqWZJz944ye9UAu9UyVp8OyTuHBAT/U27f0w=" crossorigin="anonymous">
  </head>
  <body class="kernel-body">
    <main>
      <section id="approvalView" aria-labelledby="bundleTitle">
        <div class="toolbar">
          <div>
            <h2 id="bundleTitle">Payment Bundle</h2>
            <p id="bundleSummary" class="status-line">Nothing to approve</p>
          </div>
          <div class="approval-action">
            <button id="approveButton" type="button" disabled>Approve</button>
          </div>
        </div>

        <div class="summary-strip" aria-live="polite">
          <div class="summary-metric">
            <span>Transactions</span>
            <strong id="bundleCountValue">-</strong>
          </div>
          <div class="totals-strip" id="totalsStrip"></div>
        </div>

        <div class="table-wrap bundle-table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">Account</th>
                <th scope="col">Text</th>
                <th scope="col" class="numeric">Amount</th>
              </tr>
            </thead>
            <tbody id="paymentRows">
              <tr>
                <td colspan="3" class="empty-state">-</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div id="resultPanel" class="result-panel hidden" aria-live="polite">
          <strong id="resultTitle">-</strong>
          <span id="resultDetail">-</span>
        </div>

      </section>
    </main>

    <script type="module" src="./src/frame-buster.js" integrity="sha256-NGGj/MXF4iHcdjp4OpfS5DpLKE1iVHkIc5CEwIumT0k=" crossorigin="anonymous"></script>
    <script type="module" src="./src/bootstrap.js" integrity="sha256-lzoISeECadknwDB1+hrYd5twkvRrr1Ssbqac1/hMjyg=" crossorigin="anonymous"></script>
  </body>
</html>
