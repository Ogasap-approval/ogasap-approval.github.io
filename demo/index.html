<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; manifest-src 'self'; connect-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f5f7f2">
    <title>Approval</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./src/assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <header class="app-header">
      <button id="homeButton" type="button" class="brand-mark" aria-label="Approval home">A</button>
      <div>
        <h1>Approval <span class="route-badge">Demo</span></h1>
        <p id="runtimeStatus" class="status-line">Starting</p>
      </div>
      <div class="header-actions">
        <button id="historyButton" type="button" class="secondary header-button" aria-pressed="false">History</button>
        <button id="settingsButton" type="button" class="icon-button" aria-label="Settings" aria-pressed="false" title="Settings">
          <span aria-hidden="true">⚙</span>
        </button>
      </div>
    </header>

    <main>
      <section id="settingsView" class="settings-view hidden" aria-labelledby="deviceTitle">
        <div class="panel-heading">
          <h2 id="deviceTitle">Device</h2>
          <span id="deviceBadge" class="badge badge-muted">Not enrolled</span>
        </div>

        <dl class="metadata-list">
          <div>
            <dt>Approver</dt>
            <dd id="approverValue">-</dd>
          </div>
          <div>
            <dt>Device</dt>
            <dd id="deviceValue">-</dd>
          </div>
          <div>
            <dt>Share</dt>
            <dd id="shareValue">-</dd>
          </div>
          <div>
            <dt>Key</dt>
            <dd id="keyValue">-</dd>
          </div>
          <div>
            <dt>WebAuthn</dt>
            <dd id="webauthnValue">-</dd>
          </div>
          <div>
            <dt>Storage</dt>
            <dd id="storageValue">Checking</dd>
          </div>
        </dl>

        <div class="button-row">
          <button id="enrollDemoButton" type="button">Enroll Test PKI</button>
          <button id="resetButton" type="button" class="secondary">Reset</button>
        </div>
      </section>

      <section id="historyView" class="history-view hidden" aria-labelledby="historyTitle">
        <div class="history-shell" aria-labelledby="historyTitle">
          <div class="history-list-pane">
            <div class="history-header">
              <div>
                <h2 id="historyTitle">History</h2>
                <p class="status-line">Approved last 24h</p>
              </div>
              <span id="recentCount" class="badge">0</span>
            </div>
            <div id="recentApprovals" class="activity-list history-list" aria-live="polite"></div>
          </div>

          <div id="activityDetail" class="activity-detail" aria-live="polite">
            <div class="history-detail-header">
              <h2 id="activityDetailTitle">Bundle Details</h2>
              <span id="activityDetailApprover" class="activity-approver hidden">-</span>
              <button id="activityDetailClose" type="button" class="secondary compact-button">Back</button>
            </div>
            <p id="activityDetailSummary" class="status-line">-</p>
            <div id="activityDetailTableWrap" class="table-wrap activity-detail-table-wrap">
              <table>
                <thead>
                  <tr>
                    <th scope="col">Account</th>
                    <th scope="col">Text</th>
                    <th scope="col" class="numeric">Amount</th>
                  </tr>
                </thead>
                <tbody id="activityDetailRows">
                  <tr>
                    <td colspan="3" class="empty-state">-</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

      <section id="approvalView" class="approval-view" aria-labelledby="bundleTitle">
        <div class="work-panel">
          <div class="toolbar">
            <div>
              <h2 id="bundleTitle">Payment Bundle</h2>
              <p id="bundleSummary" class="status-line">No bundle loaded</p>
            </div>
            <div class="toolbar-actions">
              <label class="count-control">
                <span>Count</span>
                <input id="paymentCountInput" type="number" min="1" max="200" step="1" value="3">
              </label>
              <button id="loadBundleButton" type="button" class="secondary">Load Demo</button>
              <div class="approve-stack">
                <button id="approveButton" type="button" disabled>Approve</button>
              </div>
            </div>
          </div>

          <div class="summary-strip" aria-live="polite">
            <div class="summary-metric">
              <span>Transactions</span>
              <strong id="bundleCountValue">-</strong>
            </div>
            <div class="totals-strip" id="totalsStrip"></div>
          </div>

          <div class="table-wrap bundle-table-wrap">
            <table>
              <thead>
                <tr>
                  <th scope="col">Account</th>
                  <th scope="col">Text</th>
                  <th scope="col" class="numeric">Amount</th>
                </tr>
              </thead>
              <tbody id="paymentRows">
                <tr>
                  <td colspan="3" class="empty-state">-</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div id="resultPanel" class="result-panel hidden" aria-live="polite">
            <strong id="resultTitle">-</strong>
            <span id="resultDetail">-</span>
          </div>

          <div class="approval-output">
            <pre id="approvalOutput" aria-live="polite"></pre>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
